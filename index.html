<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landout Browser</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
  </head>
  <body>
    <div id="app">
      <div id="toolbar"></div>
      <div id="map"></div>
      <div id="file-overlay">
        <div class="overlay-content">
          <div class="overlay-icon">&#9758;</div>
          <h2>Load a CUP File</h2>
          <p>Drag &amp; drop a .cup file here, or click to browse</p>
          <input type="file" id="file-input" accept=".cup" />
          <label for="file-input" class="file-label">Choose File</label>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
